name: Database Migrate & Seed

on:
  push:
    branches:
      - development
      - main
      - mw--migrations-actions # TEMP: remove before merging to main
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  id-token: write

jobs:
  migrate-and-seed:
    name: Migrate & Seed
    runs-on: ubuntu-latest

    # GitHub Environment selects the scoped secret set.
    # main → production, development (or anything else) → development.
    # Configure environments at: Settings → Environments → development / production
    # Each environment must define:
    #   SERVICE_ACCOUNT_KEY_FILE
    #   CLOUDSQL_INSTANCE_CONNECTION_URL
    #   DATABASE_MIGRATION_URL
    environment: ${{ (github.ref == 'refs/heads/main' || github.event.inputs.target == 'production') && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Cache Cloud SQL Auth Proxy
        id: cache-sql-proxy
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: cloud-sql-proxy
          key: cloud-sql-proxy-v2.10.0-linux-amd64

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed' # v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY_FILE }}
          export_environment_variables: 'false'

      - name: Download Cloud SQL Auth Proxy
        if: steps.cache-sql-proxy.outputs.cache-hit != 'true'
        run: |
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.10.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --port 5432 --credentials-file ${{ steps.auth.outputs.credentials_file_path }} ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_URL }} &
          sleep 5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
        run: pnpm run db:migrate

      # TODO: Seeding behavior is in flux — another dev is reworking this.
      # Open questions for that rework:
      #   - Should seeding run automatically on deploy at all? (preference: no, especially for prod)
      #   - VANTA_API_KEY is read by lib/db/seed.mjs but is not currently exposed here;
      #     wire it (or a replacement) in once the seeding strategy is finalized.
      - name: Run seeding
        env:
          DATABASE_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
        run: pnpm run db:seed
